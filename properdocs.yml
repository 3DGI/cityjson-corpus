site_name: cityjson-corpus
site_description: Shared benchmark corpus documentation for CityJSON tooling
docs_dir: docs
strict: true
not_in_nav: |
  cases/conformance/*/*.md
  cases/invalid/*.md
  cases/operations/*.md
  cases/workloads/*.md
  !cases/invalid/index.md
  !cases/operations/index.md
  !cases/workloads/index.md
nav:
  - Overview:
      - Home: index.md
      - Shared Corpus: shared-corpus.md
      - Repository Overview: repository/index.md
      - Independent Use: independent-use.md
      - Licensing: licensing.md
  - Workflow:
      - Contributing: contributing.md
      - Data Generation: data-generation.md
  - Corpus:
      - Catalog Overview: catalog/index.md
      - Case Layout: cases/index.md
      - Conformance Cases: cases/conformance/index.md
      - Operation Cases: cases/operations/index.md
      - Workload Cases: cases/workloads/index.md
      - Invalid Cases: cases/invalid/index.md
  - Schemas & Values:
      - Schemas Overview: schemas/index.md
  - Pipelines:
      - Pipelines Overview: pipelines/index.md
  - Artifacts:
      - Artifacts Overview: artifacts/index.md
  - Reference Data:
      - Derived Case Catalog: reference/cases.md
      - CJFake Manifest Schema: reference/cityjson-fake-manifest-schema.md
      - Case Schema: reference/case-schema.md
      - Invariants Schema: reference/invariants-schema.md
      - Acquisition Schema: reference/acquisition-schema.md
  - Architecture Decisions:
      - CityJSON Benchmark Corpus Design: adr/0009-cityjson-benchmark-corpus-design.md
      - Correctness Corpus Coverage and Generated Cases: adr/0010-correctness-corpus-coverage-and-generated-cases.md
theme:
  name: materialx
  topbar_style: primary
  palette:
    primary: orange
  font:
    text: Roboto
  language: en
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.tabs
    - navigation.sections
plugins:
  - search
  - gen-files:
      scripts:
        - scripts/generate_docs.py
