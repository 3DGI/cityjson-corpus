name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install just
        run: cargo install --locked just

      - name: Install cjval
        run: cargo install --locked cjval@0.9.0 --features=install-binary

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Sync documentation environment
        run: uv sync --frozen

      - name: Run lint
        run: just lint
