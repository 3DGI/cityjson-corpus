name: CI

on:
  push:
    branches:
      - main
  pull_request:

# The lint job needs the cityjson-fake manifest schema for profile validation.
# We download just that one file via curl rather than cloning the full repo.
# CJFAKE_MANIFEST_SCHEMA is picked up by corpus_cases.py and validate_profiles.sh.
# Once 3DGI/cityjson-fake is public, this keeps CI lightweight (no full clone).

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cityjson-corpus

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          path: cityjson-corpus

      - name: Fetch cityjson-fake manifest schema
        run: |
          mkdir -p /tmp/cjfake/src/data
          curl -fsSL \
            "https://raw.githubusercontent.com/3DGI/cityjson-fake/main/src/data/cityjson-fake-manifest.schema.json" \
            -o /tmp/cjfake/src/data/cityjson-fake-manifest.schema.json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install just
        run: cargo install --locked just

      - name: Install cjval
        run: cargo install --locked cjval@0.9.0 --features=build-binary

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Sync documentation environment
        run: uv sync --frozen

      - name: Run lint
        env:
          CJFAKE_MANIFEST_SCHEMA: /tmp/cjfake/src/data/cityjson-fake-manifest.schema.json
        run: just lint
