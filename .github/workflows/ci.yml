name: CI

on:
  push:
    branches:
      - main
  pull_request:

# cityjson-benchmarks uses cityjson-fake for profile validation and data
# generation. The cityjson-fake repo is checked out as a sibling so that
# scripts can find it at ../cityjson-fake (the default path used by all
# scripts and corpus_cases.py).

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check out cityjson-fake
        uses: actions/checkout@v4
        with:
          repository: 3DGI/cityjson-fake
          path: ../cityjson-fake

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install just
        run: cargo install --locked just

      - name: Install cjval
        run: cargo install --locked cjval@0.9.0 --features=build-binary

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Sync documentation environment
        run: uv sync --frozen

      - name: Run lint
        run: just lint

      - name: Build documentation
        run: just docs-build
